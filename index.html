<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>coolhand-cli — npm download metrics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== Terminal Green theme (GitHub dark + terminal green) ===== */
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --panel-2: #1c2129;
      --line: #30363d;
      --ink: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-dim: rgba(63, 185, 80, .14);
      --red: #f85149;
      --red-dim: rgba(248, 81, 73, .14);
      --type: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

      --hero: clamp(3rem, 11vw, 6rem);
      --stat: clamp(1.4rem, 3.6vw, 2.1rem);
    }
    * { box-sizing: border-box; }
    html, body { overflow-x: hidden; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: var(--type); line-height: 1.5; -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(1100px 460px at 50% -8%, rgba(63,185,80,.12), transparent 70%);
    }
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(0deg, rgba(255,255,255,.018) 0 1px, transparent 1px 3px); opacity: .5;
    }
    .wrap { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: clamp(20px, 5vw, 48px) 18px 48px; }

    .win { border: 1px solid var(--line); border-radius: 12px; background: linear-gradient(180deg, var(--panel), var(--bg)); box-shadow: 0 24px 60px rgba(0,0,0,.45); overflow: hidden; }
    .win-bar { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: rgba(255,255,255,.02); }
    .lights { display: inline-flex; gap: 7px; }
    .lights i { width: 11px; height: 11px; border-radius: 50%; display: block; }
    .lights i:nth-child(1) { background: #ff5f56; }
    .lights i:nth-child(2) { background: #ffbd2e; }
    .lights i:nth-child(3) { background: #27c93f; }
    .win-title { color: var(--muted); font-size: .78rem; flex: 1; text-align: center; }
    .npm-badge { background: #cb3837; color: #fff; font-weight: 700; font-size: .68rem; padding: 3px 7px; border-radius: 5px; }
    .win-body { padding: clamp(18px, 4vw, 34px); }

    .prompt { font-size: clamp(.78rem, 1.6vw, .95rem); color: var(--muted); margin-bottom: clamp(20px, 4vw, 34px); }
    .prompt .sigil { color: var(--green); margin-right: 8px; }
    .prompt .arg { color: var(--ink); }
    .cursor { display: inline-block; width: 9px; height: 1.05em; background: var(--green); margin-left: 6px; vertical-align: text-bottom; animation: blink 1.1s steps(1) infinite; box-shadow: 0 0 8px var(--green); }
    @keyframes blink { 50% { opacity: 0; } }

    .section-label { color: var(--green); font-size: .72rem; letter-spacing: .16em; text-transform: uppercase; margin: clamp(26px, 5vw, 38px) 0 14px; opacity: .85; }

    .eyebrow { color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .18em; margin: 0 0 12px; }
    .hero-num { font-size: var(--hero); font-weight: 800; line-height: .95; letter-spacing: -.02em; color: var(--green); text-shadow: 0 0 28px rgba(63,185,80,.45); }
    .hero-sub { color: var(--muted); margin-top: 12px; font-size: .9rem; }
    .pill { display: inline-flex; align-items: center; gap: 7px; font-weight: 600; font-size: .85rem; padding: 6px 12px; border-radius: 6px; margin-top: 16px; border: 1px solid transparent; }
    .pill.up { color: var(--green); background: var(--green-dim); border-color: rgba(63,185,80,.3); }
    .pill.down { color: var(--red); background: var(--red-dim); border-color: rgba(248,81,73,.3); }
    .pill.flat { color: var(--muted); background: rgba(255,255,255,.05); }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
    .stat { border: 1px solid var(--line); border-radius: 10px; padding: 16px; background: var(--panel-2); position: relative; }
    .stat::before { content: ""; position: absolute; left: 0; top: 12px; bottom: 12px; width: 2px; background: var(--green); border-radius: 2px; opacity: .55; }
    .stat .k { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; margin: 0 0 8px; padding-left: 10px; }
    .stat .v { font-size: var(--stat); font-weight: 700; letter-spacing: -.01em; padding-left: 10px; }
    .stat .v small { display: block; font-size: .68rem; color: var(--muted); font-weight: 400; margin-top: 5px; letter-spacing: 0; }

    .chart-card { border: 1px solid var(--line); border-radius: 10px; padding: 20px 20px 12px; background: var(--panel-2); }
    .chart-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .chart-head h2 { font-size: .85rem; font-weight: 600; margin: 0 0 2px; text-transform: uppercase; letter-spacing: .1em; }
    .chart-head .hint { color: var(--muted); font-size: .74rem; margin: 0; }
    .toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
    .toggle button { font-family: var(--type); font-size: .74rem; color: var(--muted); background: transparent; border: 0; padding: 6px 13px; cursor: pointer; transition: background .2s, color .2s; }
    .toggle button.active { background: var(--green-dim); color: var(--green); }
    .toggle button:not(.active):hover { color: var(--ink); }
    .chart-box { position: relative; height: clamp(220px, 34vh, 320px); }

    footer { margin-top: 24px; color: var(--muted); font-size: .76rem; text-align: center; line-height: 1.8; }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .live { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 7px; box-shadow: 0 0 8px var(--green); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 50% { opacity: .35; } }

    .state { padding: 48px; text-align: center; color: var(--muted); }
    .state.error { color: var(--red); }

    .reveal { opacity: 0; transform: translateY(14px); transition: opacity .6s ease, transform .6s ease; }
    .reveal.in { opacity: 1; transform: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .2s !important; }
      .reveal { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="win">
      <div class="win-bar">
        <span class="lights"><i></i><i></i><i></i></span>
        <span class="win-title">coolhand-cli — npm download metrics</span>
        <span class="npm-badge">npm</span>
      </div>
      <div class="win-body">
        <div class="prompt"><span class="sigil">$</span>coolhand stats --package <span class="arg">coolhand-cli</span> --weekly<span class="cursor"></span></div>
        <main id="app"><div class="state">loading metrics…</div></main>
        <footer id="footer"></footer>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    var REDUCED = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    function parseUTC(s) { return new Date(s + "T00:00:00Z"); }
    function fmtDay(s) { return parseUTC(s.slice(0, 10)).toLocaleDateString(undefined, { month: "short", day: "numeric", timeZone: "UTC" }); }
    function fmtRange(weekStart) {
      var start = parseUTC(weekStart), end = new Date(start);
      end.setUTCDate(end.getUTCDate() + 6);
      var o = { month: "short", day: "numeric", timeZone: "UTC" };
      return start.toLocaleDateString(undefined, o) + " – " + end.toLocaleDateString(undefined, o);
    }
    function num(n) { return n.toLocaleString(); }

    function countUp(el, to) {
      if (REDUCED || to === 0) { el.textContent = num(to); return; }
      var dur = 900, start = null;
      function step(t) {
        if (!start) start = t;
        var p = Math.min((t - start) / dur, 1);
        el.textContent = num(Math.round(to * (1 - Math.pow(1 - p, 3))));
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // numeric stat (animated count-up) and text stat (rendered as-is)
    function statNum(key, value, sub) {
      return '<div class="stat reveal"><p class="k">' + key + '</p>' +
             '<div class="v"><span class="cu" data-to="' + value + '">0</span>' +
             (sub ? '<small>' + sub + '</small>' : '') + '</div></div>';
    }
    function statText(key, text, sub) {
      return '<div class="stat reveal"><p class="k">' + key + '</p>' +
             '<div class="v">' + text + (sub ? '<small>' + sub + '</small>' : '') + '</div></div>';
    }

    async function render() {
      var app = document.getElementById("app");
      try {
        var res = await fetch("./data.json", { cache: "no-store" });
        if (!res.ok) throw new Error("could not load data.json");
        var data = await res.json();
        var weeks = data.weeks || [];
        var demand = data.demand || {};
        var rel = data.release || null;

        if (weeks.length === 0) {
          app.innerHTML = '<div class="state">No download data yet — check back after the next daily update.</div>';
          return;
        }

        // ---- DEMAND metrics (all derived from the same data, nothing invented) ----
        var latest = weeks[weeks.length - 1];
        var previous = weeks.length > 1 ? weeks[weeks.length - 2] : null;
        var total = weeks.reduce(function (s, w) { return s + w.downloads; }, 0);
        var avg = Math.round(total / weeks.length);
        var peak = weeks.reduce(function (b, w) { return w.downloads > b.downloads ? w : b; }, weeks[0]);
        var bw = demand.busiestWeekday || null;

        var pill = "";
        if (previous && previous.downloads > 0) {
          var diff = latest.downloads - previous.downloads;
          var pct = Math.round((diff / previous.downloads) * 1000) / 10;
          var cls = diff > 0 ? "up" : diff < 0 ? "down" : "flat";
          var arrow = diff > 0 ? "▲" : diff < 0 ? "▼" : "—";
          var signed = (diff >= 0 ? "+" : "") + num(diff);
          pill = '<span class="pill ' + cls + '">' + arrow + " " + Math.abs(pct) + "% (" + signed + ") vs prior week</span>";
        }

        // ---- SUPPLY / release section (only if the registry call succeeded) ----
        var releaseHtml = "";
        if (rel && rel.version) {
          var daysSince = rel.lastRelease ? Math.floor((Date.now() - new Date(rel.lastRelease).getTime()) / 86400000) : null;
          var cadence = (rel.count > 1 && rel.firstRelease && rel.lastRelease)
            ? Math.round(((new Date(rel.lastRelease) - new Date(rel.firstRelease)) / 86400000 / (rel.count - 1)) * 10) / 10
            : null;
          releaseHtml =
            '<p class="section-label reveal">// release activity</p>' +
            '<div class="stats">' +
              statText("current version", "v" + rel.version, rel.firstRelease ? "since " + fmtDay(rel.firstRelease) : "") +
              (daysSince !== null ? statNum("days since release", daysSince, "last shipped " + fmtDay(rel.lastRelease)) : "") +
              statNum("total releases", rel.count, "versions published") +
              (cadence !== null ? statText("ship cadence", cadence + " days", "between releases") : "") +
            '</div>';
        }

        app.innerHTML =
          '<section class="hero reveal">' +
            '<p class="eyebrow">// downloads · last complete week</p>' +
            '<div class="hero-num"><span class="cu" data-to="' + latest.downloads + '">0</span></div>' +
            '<p class="hero-sub">week of ' + fmtRange(latest.weekStart) + '</p>' +
            pill +
          '</section>' +
          '<p class="section-label reveal">// downloads</p>' +
          '<div class="stats">' +
            statNum("total downloads", total, "since " + fmtDay(weeks[0].weekStart)) +
            (demand.last30Days != null ? statNum("last 30 days", demand.last30Days, "rolling month") : "") +
            statNum("avg / week", avg, "across " + weeks.length + " weeks") +
            statNum("best week", peak.downloads, "week of " + fmtDay(peak.weekStart)) +
            (bw ? statText("busiest weekday", bw.name, num(bw.downloads) + " downloads") : "") +
            statNum("weeks tracked", weeks.length, "complete weeks") +
          '</div>' +
          '<p class="section-label reveal">// trend</p>' +
          '<div class="chart-card reveal">' +
            '<div class="chart-head">' +
              '<div><h2>downloads over time</h2><p class="hint">each point = one complete Monday–Sunday week</p></div>' +
              '<div class="toggle">' +
                '<button type="button" data-view="weekly" class="active">weekly</button>' +
                '<button type="button" data-view="cumulative">cumulative</button>' +
              '</div>' +
            '</div>' +
            '<div class="chart-box"><canvas id="chart"></canvas></div>' +
          '</div>' +
          releaseHtml;

        // count-up every numeric stat
        [].forEach.call(document.querySelectorAll(".cu"), function (el) {
          countUp(el, parseInt(el.getAttribute("data-to"), 10));
        });

        // staggered reveal
        var items = [].slice.call(document.querySelectorAll(".reveal"));
        if ("IntersectionObserver" in window && !REDUCED) {
          var io = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
          }, { threshold: .12 });
          items.forEach(function (el, i) { el.style.transitionDelay = Math.min(i * 60, 480) + "ms"; io.observe(el); });
        } else {
          items.forEach(function (el) { el.classList.add("in"); });
        }

        // chart + weekly/cumulative toggle
        var weeklyData = weeks.map(function (w) { return w.downloads; });
        var run = 0;
        var cumulativeData = weeks.map(function (w) { run += w.downloads; return run; });
        var chart = drawChart(weeks, weeklyData);
        [].forEach.call(document.querySelectorAll(".toggle button"), function (btn) {
          btn.addEventListener("click", function () {
            [].forEach.call(document.querySelectorAll(".toggle button"), function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            chart.data.datasets[0].data = btn.getAttribute("data-view") === "cumulative" ? cumulativeData : weeklyData;
            chart.update();
          });
        });

        document.getElementById("footer").innerHTML =
          '<span class="live"></span>last updated ' + new Date(data.lastUpdated).toLocaleString() +
          ' · auto-updates daily via GitHub Actions · src: ' +
          '<a href="https://www.npmjs.com/package/coolhand-cli" target="_blank" rel="noopener">npm</a>';
      } catch (err) {
        app.innerHTML = '<div class="state error">failed to load metrics: ' + err.message + '</div>';
      }
    }

    function drawChart(weeks, values) {
      var ctx = document.getElementById("chart").getContext("2d");
      var grad = ctx.createLinearGradient(0, 0, 0, 320);
      grad.addColorStop(0, "rgba(63,185,80,.32)");
      grad.addColorStop(1, "rgba(63,185,80,0)");

      var glow = {
        id: "glow",
        beforeDatasetsDraw: function (c) { c.ctx.save(); c.ctx.shadowColor = "rgba(63,185,80,.7)"; c.ctx.shadowBlur = 14; },
        afterDatasetsDraw: function (c) { c.ctx.restore(); },
      };

      return new Chart(ctx, {
        type: "line",
        plugins: [glow],
        data: {
          labels: weeks.map(function (w) { return fmtDay(w.weekStart); }),
          datasets: [{
            data: values,
            borderColor: "#3fb950",
            backgroundColor: grad,
            borderWidth: 2.5,
            fill: true,
            tension: 0.35,
            pointRadius: 3,
            pointHoverRadius: 6,
            pointBackgroundColor: "#3fb950",
            pointBorderColor: "#0d1117",
            pointBorderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: REDUCED ? false : { duration: 900 },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: "#0d1117", borderColor: "#30363d", borderWidth: 1,
              titleColor: "#e6edf3", bodyColor: "#3fb950", padding: 12, cornerRadius: 8, displayColors: false,
              titleFont: { family: "'JetBrains Mono', monospace" }, bodyFont: { family: "'JetBrains Mono', monospace" },
              callbacks: {
                title: function (i) { return "week of " + fmtRange(weeks[i[0].dataIndex].weekStart); },
                label: function (i) { return num(i.parsed.y) + " downloads"; },
              },
            },
          },
          scales: {
            y: { beginAtZero: true, grid: { color: "rgba(255,255,255,.05)" }, ticks: { color: "#8b949e", precision: 0, font: { family: "'JetBrains Mono', monospace" } }, border: { display: false } },
            x: { grid: { display: false }, ticks: { color: "#8b949e", maxRotation: 0, autoSkip: true, maxTicksLimit: 8, font: { family: "'JetBrains Mono', monospace" } }, border: { color: "#30363d" } },
          },
        },
      });
    }

    render();
  </script>
</body>
</html>
