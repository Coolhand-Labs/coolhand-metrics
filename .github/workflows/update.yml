name: Update npm download data

on:
  schedule:
    - cron: "0 6 * * *" # daily 06:00 UTC — npm's prior-day data has settled by then
  workflow_dispatch: {} # manual "Run workflow" button for testing

permissions:
  contents: write # required so the job can commit the refreshed data.json

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: node scripts/update-data.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update npm download data"
          git push
